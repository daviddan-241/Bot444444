openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nezora Deploy API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: deploy
    description: Deployment operations
  - name: providers
    description: Provider connections
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with admin token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /providers:
    get:
      operationId: getProviders
      tags: [providers]
      summary: List provider connections
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvidersResponse"

  /real/limits:
    post:
      operationId: checkLimits
      tags: [deploy]
      summary: Check provider rate limits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitsResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    AuthResult:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: ["string", "null"]
      required:
        - ok

    ProviderConnection:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        connected:
          type: boolean
        status:
          type: string
        limitText:
          type: string
      required:
        - key
        - label
        - connected
        - status
        - limitText

    ProvidersResponse:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/ProviderConnection"
      required:
        - connections

    LimitsInput:
      type: object
      properties:
        githubToken:
          type: ["string", "null"]

    ProviderLimit:
      type: object
      properties:
        provider:
          type: string
        metric:
          type: string
        used:
          type: ["integer", "null"]
        limit:
          type: ["integer", "null"]
        remaining:
          type: ["integer", "null"]
        resetAt:
          type: ["string", "null"]
        state:
          type: string
        note:
          type: string
        action:
          type: string
      required:
        - provider
        - metric
        - state
        - note
        - action

    LimitsResponse:
      type: object
      properties:
        ok:
          type: boolean
        limits:
          type: array
          items:
            $ref: "#/components/schemas/ProviderLimit"
        policy:
          type: object
          additionalProperties: true
      required:
        - ok
        - limits
