version: "3.9"

# Nezora — self-hosted Cloud OS
# Run: docker compose up -d
# First run: docker compose exec ollama ollama pull llama3.2

services:
  # ── Ollama — free local AI (no API key needed) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nezora-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Uncomment to use GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── API Server ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: nezora-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NEZORA_ADMIN_TOKEN: ${NEZORA_ADMIN_TOKEN:-changeme-set-this-in-env}
      NEZORA_ADMIN_USERNAME: ${NEZORA_ADMIN_USERNAME:-admin}
      NEZORA_ADMIN_PASSWORD: ${NEZORA_ADMIN_PASSWORD:-changeme-set-this-in-env}
      PUBLIC_URL: ${PUBLIC_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - api_data:/app/.nezora-data
      - api_apps:/app/.nezora-apps
      - api_uploads:/app/.nezora-uploads
      # Mount Docker socket if you want the API to manage containers:
      # - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Web dashboard ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: artifacts/nezora/Dockerfile
      args:
        # Pass your API URL — defaults to same-host /api proxy via nginx
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: nezora-web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama_models:
  api_data:
  api_apps:
  api_uploads:
