kind = "mobile"
previewPath = "/nezora-mobile"
title = "Cloud OS Mobile"
version = "1.0.0"
id = "artifacts/nezora-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = ["/nezora-mobile"]
localPort = 19006

[services.env]
PORT = "19006"

[services.development]
run = "pnpm --filter @workspace/nezora-mobile run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/nezora-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/nezora-mobile", "run", "serve"]
