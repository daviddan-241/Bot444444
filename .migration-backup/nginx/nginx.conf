user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';

  access_log /var/log/nginx/access.log main buffer=16k;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 75;
  server_tokens off;

  # Upload size — support deploying large ZIPs
  client_max_body_size 500M;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/wasm image/svg+xml;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS if certs exist, otherwise serve directly
    location / {
      # If you have SSL certs configured, uncomment:
      # return 301 https://$host$request_uri;
      # For initial HTTP-only setup, proxy directly:
      proxy_pass http://api:8080;
      include /etc/nginx/conf.d/proxy_params.conf;
    }
  }

  # ── HTTPS Main Server ──────────────────────────────────────────────────────
  # Uncomment after running certbot to get certs
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #
  #   ssl_certificate /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_timeout 1d;
  #   ssl_session_cache shared:SSL:10m;
  #   ssl_stapling on;
  #   ssl_stapling_verify on;
  #
  #   location / {
  #     proxy_pass http://api:8080;
  #     include /etc/nginx/conf.d/proxy_params.conf;
  #   }
  # }

  include /etc/nginx/conf.d/*.conf;
}
