version: "3.9"

# Nezora — self-hosted Cloud OS
# Quick start:
#   docker compose up -d
#   docker compose exec ollama ollama pull llama3.2
# Then open: http://localhost:3000

services:
  # ── Ollama — free local AI, no API key needed ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nezora-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU support — uncomment if you have an Nvidia GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Nezora (web dashboard + API in one container) ────────────────────────
  # Single image: Express serves both the Vite dashboard and /api routes.
  # Works identically on Render, Railway, Fly.io, any VPS.
  nezora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nezora
    ports:
      - "${PORT:-3000}:10000"
    environment:
      PORT: 10000
      NODE_ENV: production
      # AI — Ollama is the default (free, local). Groq is cloud fallback.
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Auth — change these before exposing to the internet!
      NEZORA_ADMIN_TOKEN: ${NEZORA_ADMIN_TOKEN:-changeme-please-set-this}
      NEZORA_ADMIN_USERNAME: ${NEZORA_ADMIN_USERNAME:-admin}
      NEZORA_ADMIN_PASSWORD: ${NEZORA_ADMIN_PASSWORD:-changeme-please-set-this}
      # Domain — leave blank for auto-detection
      PUBLIC_URL: ${PUBLIC_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # Mount Docker socket to let Nezora manage containers (optional):
      # - /var/run/docker.sock:/var/run/docker.sock
    volumes:
      - nezora_data:/app/.nezora-data
      - nezora_apps:/app/.nezora-apps
      - nezora_uploads:/app/.nezora-uploads
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/api/ping"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  ollama_models:   # Ollama model weights — survives container restarts
  nezora_data:     # App catalog, config, project metadata
  nezora_apps:     # Deployed app files
  nezora_uploads:  # Upload temp storage
