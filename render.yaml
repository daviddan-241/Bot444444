# Nezora Cloud OS — Render deployment blueprint
# Connect this repo in your Render dashboard → New Web Service
# Render auto-sets PORT and RENDER_EXTERNAL_URL — no extra config needed
# UptimeRobot: monitor https://<your-render-url>/api/ping every 5 minutes

services:
  - type: web
    name: nezora
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/nezora run build && cp -r artifacts/nezora/dist artifacts/api-server/public
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production

      # Render sets this automatically — used by the keep-alive pinger
      # RENDER_EXTERNAL_URL is injected automatically, no action needed

      # Persistent storage path — apps survive server restarts
      - key: NEZORA_APPS_DIR
        value: /opt/render/project/src/.nezora-apps

      # Optional: set a login password for the UI
      # Leave blank for open/public mode (anyone on your URL can access)
      - key: ADMIN_TOKEN
        sync: false

      # Free AI providers — set at least one for full AI agent features
      # OpenRouter: https://openrouter.ai (free, no credit card)
      - key: OPENROUTER_API_KEY
        sync: false
      # Groq: https://console.groq.com (free, ultra-fast Llama 3.3)
      - key: GROQ_API_KEY
        sync: false
      # Together.ai: https://api.together.xyz (free tier)
      - key: TOGETHER_API_KEY
        sync: false

      # GitHub token — allows deploying private repos
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        sync: false
